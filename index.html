<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappedin JS v6 Getting Started</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
      }

      #root {
        height: 100%;
        width: 100%;
        position: relative;
      }

      #mappedin-cover {
        position: absolute;
        bottom: 10px;
        left: 10px;
        width: 160px;
        height: 70px;
        background: black;
        z-index: 999999;
        pointer-events: none;
        border-radius: 6px;
      }


    </style>
  </head>

<body>
  <div id="root">
      <!-- Overlay to cover Mappedin watermark -->
  <div id="mappedin-cover"></div>
  </div>



  <script type="module" src="/src/main.tsx"></script>
</body>


</html>
